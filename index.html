<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AG Creative</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

.hero {
  text-align: center;
  margin-top: 80px;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.hero p {
  color: #aaa;
  font-size: 18px;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 24px;
  background: white;
  color: black;
  text-decoration: none;
  border-radius: 6px;
}

.section {
  margin-top: 100px;
}

.section h2 {
  margin-bottom: 20px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

</style>

</head>
<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>AG Creative</h1>
    <p>Growth Marketing • Content • Performance</p>
    <a class="btn" href="https://www.linkedin.com" target="_blank">View LinkedIn</a>
  </div>

  <!-- ABOUT -->
  <div class="section">
    <h2>About Me</h2>
    <div class="card">
      <p>
        I build content systems that drive real growth.
        From 0 to 800K+ views in 28 days — fully organic.
      </p>
    </div>
  </div>

  <!-- PORTFOLIO -->
  <div class="section">
    <h2>Portfolio</h2>

    <div class="card">
      <h3>KITS UK</h3>
      <p>1.1M views in 60 days • 0 paid ads</p>
    </div>

  </div>

</div>

</body>
</html>
